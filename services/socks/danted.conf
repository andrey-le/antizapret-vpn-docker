logoutput: stdout
errorlog: stderr

internal: eth0 port = 8118
external: eth0
external: eth1
external.rotation: route

socksmethod: username
user.privileged: root
user.unprivileged: nobody

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error connect disconnect
}

client block {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: connect error
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error connect disconnect
    socksmethod: username
}

socks block {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: connect error
}
