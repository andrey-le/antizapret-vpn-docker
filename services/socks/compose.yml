services:
  socks:
    image: xtrime/antizapret-vpn-socks:6.0.7
    init: true
    build:
      context: .
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 100k
        max-file: 2
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - SOCKS_USERNAME
      - SOCKS_PASSWORD
      - SOCKS_EXTERNAL_IFACES
      - |
        ROUTES=
        openvpn:10.1.165.0/24;
        wireguard:10.1.166.0/24;
        wireguard-amnezia:10.1.167.0/24;
        adguard:14.16.0.1;
        az-local:14.16.0.0/15;
        az-world:14.18.0.0/15;
